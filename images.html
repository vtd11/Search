<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link href="style.css" rel="stylesheet">
    </head>

    <body>
        
        <div class="navigation">
            <div id="links">
                <a href="index.html">Google Search</a>
            </div>
        </div>
        
        <div class="logo">
            <img src="googleimages_logo.png" alt="Google Images Icon">
        </div>

        <form action="https://www.google.com/search">
            <input type="text" name="q" class="nav-bar">
            <input type="hidden" name="tbm" value="isch">

            <div class="buttons">
                <input type="submit" value="Search" class="button-unit">
            </div>
        </form>
    </body>
</html>
